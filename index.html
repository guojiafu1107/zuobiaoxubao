<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>坐标寻宝 · 座位大冒险</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/grid.css"/>
  <link rel="stylesheet" href="css/feedback.css"/>
  <link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>
  <div id="app">
    <!-- 开始界面 -->
    <section id="start-screen" class="screen active">
      <div class="start-content">
        <h1><span class="icon">🌟</span> 坐标寻宝</h1>
        <p class="subtitle">找到小动物藏在哪里！</p>
        <div id="theme-selector" class="selector-group"></div>
        <div id="difficulty-selector" class="selector-group"></div>
        <button id="btn-start" class="btn-primary">开始冒险</button>
      </div>
    </section>

    <!-- 游戏界面 -->
    <section id="game-screen" class="screen">
      <div id="top-bar">
        <div id="prompt-area">请找到 <strong>第2排 第3座</strong></div>
        <div id="score-area">⭐ 0 / 连击 ×0</div>
      </div>
      <div id="board-container">
        <div id="col-labels"></div>
        <div id="row-labels-and-grid">
          <div id="row-labels"></div>
          <div id="grid" role="grid" aria-label="寻宝网格"></div>
        </div>
      </div>
      <div id="bottom-bar">
        <div id="timer"></div>
        <div id="progress">第 1/10 题</div>
      </div>
    </section>

    <!-- 结束界面 -->
    <section id="end-screen" class="screen">
      <div class="end-content">
        <h2>🎉 你真棒！</h2>
        <div id="final-stars"></div>
        <p id="final-message">太厉害了！</p>
        <button id="btn-replay" class="btn-primary">再来一轮</button>
        <button id="btn-change-theme" class="btn-secondary">换个场景</button>
      </div>
    </section>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/board.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
